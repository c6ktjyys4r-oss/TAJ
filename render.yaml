services:
        # ── Frontend ─────────────────────────────────────────────────────────────────
        - type: web
          name: taj-finance
          runtime: static
          repo: https://github.com/c6ktjyys4r-oss/TAJ.git
          branch: main
          autoDeploy: true
          buildCommand: npm install && npm run build
          staticPublishPath: dist
          pullRequestPreviewsEnabled: false
          routes:
            - type: rewrite
              source: /*
              destination: /index.html
          headers:
            - path: /*
              name: X-Frame-Options
              value: DENY
            - path: /*
              name: X-Content-Type-Options
              value: nosniff
            - path: /*
              name: Referrer-Policy
              value: strict-origin-when-cross-origin
            - path: /assets/*
              name: Cache-Control
              value: public, max-age=31536000, immutable
            - path: /sw.js
              name: Cache-Control
              value: no-cache, no-store, must-revalidate
            - path: /manifest.webmanifest
              name: Cache-Control
              value: no-cache
          envVars:
            - key: VITE_API_URL
              value: https://taj-finance-api.onrender.com

        # ── Backend API ───────────────────────────────────────────────────────────────
        - type: web
          name: taj-finance-api
          runtime: node
          repo: https://github.com/c6ktjyys4r-oss/TAJ.git
          branch: main
          rootDir: server
          autoDeploy: true
          buildCommand: npm install --include=dev && npm run build && npm run db:migrate
          startCommand: node dist/index.js
          healthCheckPath: /api/health
          pullRequestPreviewsEnabled: false
          envVars:
            - key: NODE_ENV
              value: production
            - key: NODE_VERSION
              value: "22"
            - key: CORS_ORIGIN
              value: https://taj-finance.onrender.com
            - key: DATABASE_URL
              sync: false
    